name: ci

on: [push, pull_request]

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Zxilly/setup-cangjie@v2
        with:
          channel: sts
          version: 1.1.0
      - name: build
        shell: bash
        run: cjpm build
      - name: test
        shell: bash
        run: cjpm test
      - name: integration test
        shell: bash
        run: |
          cjpm build -m cjxe_integration_tests
          bash cjxe_integration_tests/run_tests.sh target/release/bin/cjxe_integration_tests
